name: Linux
on: [push, pull_request]
jobs:
  testing:
    name: Tests [Go ${{ matrix.go }} OS ${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        go: [stable]
        os: [ubuntu-latest]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Check out code
        uses: actions/checkout@v6
      - name: Init Go modules Cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Install Go dependencies
        run: go mod download
      - name: Run golang tests on Linux with coverage
        run: |
          mkdir ./coverage-ci
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage-ci/frame.out -covermode=atomic ./pkg/frame
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage-ci/pipe.out -covermode=atomic ./pkg/pipe
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage-ci/rpc.out -covermode=atomic ./pkg/rpc
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage-ci/socket.out -covermode=atomic ./pkg/socket
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage-ci/internal.out -covermode=atomic ./internal
      - name: Run fuzz tests
        run: |
          go test -tags=debug -fuzz=FuzzReadFrame -fuzztime=30s ./pkg/frame
          go test -tags=debug -fuzz=FuzzReadOptions -fuzztime=30s ./pkg/frame
          go test -tags=debug -fuzz=FuzzVerifyCRC -fuzztime=30s ./pkg/frame
          go test -tags=debug -fuzz=FuzzFrameRoundTrip -fuzztime=30s ./pkg/frame
          go test -tags=debug -fuzz=FuzzReceiveFrame -fuzztime=30s ./internal
      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage-testing
          path: ./coverage-ci
  codecov:
    name: Upload codecov
    needs:
      - testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true
      - run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/goridge\/v4\// {
              sub(/^github\.com\/roadrunner-server\/goridge\/v4\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt
      - name: upload to codecov
        uses: codecov/codecov-action@v5
        with:
          files: summary.txt
          fail_ci_if_error: false
